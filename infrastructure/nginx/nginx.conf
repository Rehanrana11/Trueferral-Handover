user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─── Logging ─────────────────────────────────────────────────────────────
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"user_agent":"$http_user_agent"}';

    access_log /var/log/nginx/access.log json_combined;

    # ─── Security Headers ─────────────────────────────────────────────────────
    server_tokens off;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ─── Performance ──────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain application/json application/javascript text/css;

    # ─── Rate Limiting Zones ──────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=ws_upgrade:10m rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ─── Upstream: Signaling Servers ──────────────────────────────────────────
    upstream signaling_backend {
        least_conn;
        server signaling:8443 max_fails=3 fail_timeout=30s;
        # Add more replicas here for horizontal scaling:
        # server signaling_2:8443 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ─── HTTP → HTTPS Redirect ────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ─── HTTPS Server ─────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name trueferral.com www.trueferral.com;

        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        client_max_body_size 10k;
        limit_conn addr 20;

        # ─── Health Check (public) ────────────────────────────────────────────
        location /health {
            proxy_pass http://signaling_backend/health;
            proxy_set_header Host $host;
            access_log off;
        }

        # ─── WebSocket Signaling ──────────────────────────────────────────────
        location /ws {
            limit_req zone=ws_upgrade burst=5 nodelay;

            proxy_pass http://signaling_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            # Never cache WebSocket
            proxy_cache off;
        }

        # ─── Block all other routes ───────────────────────────────────────────
        location / {
            return 404;
        }
    }
}
