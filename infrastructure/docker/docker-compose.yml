version: "3.9"

services:
  # ─── Signaling Server ──────────────────────────────────────────────────────
  signaling:
    build:
      context: ../../signaling-server
      dockerfile: ../infrastructure/docker/Dockerfile.signaling
    container_name: trueferral-signaling
    restart: unless-stopped
    ports:
      - "8443:8443"
    environment:
      NODE_ENV: production
      PORT: 8443
    env_file:
      - ../../signaling-server/.env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - trueferral-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8443/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1"
          memory: 512M
      restart_policy:
        condition: on-failure
        max_attempts: 5

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: trueferral-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - trueferral-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Nginx Reverse Proxy / Load Balancer ───────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: trueferral-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - signaling
    networks:
      - trueferral-net

  # ─── coturn TURN Server ────────────────────────────────────────────────────
  coturn:
    image: coturn/coturn:latest
    container_name: trueferral-coturn
    restart: unless-stopped
    network_mode: host  # Required for TURN relay (UDP port range)
    volumes:
      - ../../turn-server/turnserver.conf:/etc/turnserver.conf:ro
      - coturn_logs:/var/log/coturn
    command: -c /etc/turnserver.conf

volumes:
  redis_data:
  coturn_logs:

networks:
  trueferral-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
