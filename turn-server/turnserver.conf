# ─── Trueferral Enterprise coturn Configuration ──────────────────────────────
# Place this file at: /etc/turnserver.conf
# Docs: https://github.com/coturn/coturn

# ─── Network ─────────────────────────────────────────────────────────────────
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0

# Replace with your actual public IP
external-ip=YOUR_SERVER_PUBLIC_IP

# ─── Authentication ───────────────────────────────────────────────────────────
# Use time-limited credentials (NOT static password)
lt-cred-mech
use-auth-secret
static-auth-secret=REPLACE_WITH_STRONG_SECRET_MIN_32_CHARS
# Credentials expire after 24 hours
auth-secret-timestamp-expiry=86400

realm=trueferral.com
server-name=turn.trueferral.com

# ─── TLS / DTLS ──────────────────────────────────────────────────────────────
cert=/etc/letsencrypt/live/turn.trueferral.com/fullchain.pem
pkey=/etc/letsencrypt/live/turn.trueferral.com/privkey.pem
cipher-list=ECDH+AESGCM:DH+AESGCM:ECDH+AES256:DH+AES256:ECDH+AES128:DH+AES:!aNULL:!MD5:!DSS
no-sslv3
no-tlsv1
no-tlsv1_1
# TLS 1.2+ only

# ─── Relay Ports ──────────────────────────────────────────────────────────────
min-port=49152
max-port=65535

# ─── Security Hardening ───────────────────────────────────────────────────────
# Block TURN relay to internal/private IP ranges (prevents SSRF via TURN)
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=198.51.100.0-198.51.100.255
denied-peer-ip=203.0.113.0-203.0.113.255
denied-peer-ip=240.0.0.0-255.255.255.255
denied-peer-ip=::1
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff

# ─── Logging ──────────────────────────────────────────────────────────────────
log-file=/var/log/coturn/turn.log
verbose
# log-binding        # Uncomment for debugging ICE issues

# ─── Performance ──────────────────────────────────────────────────────────────
# Allocations per user
user-quota=20
# Total allocations
total-quota=1000
max-bps=5000000

# ─── CLI Admin (disable in production) ───────────────────────────────────────
no-cli
